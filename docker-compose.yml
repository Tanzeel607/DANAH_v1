# ============================================================================
# DANAH — full local stack.  `docker compose up` brings up everything.
#   api        FastAPI (uvicorn), runs migrations on start
#   worker     ARQ worker  — ingestion syncs, embeddings, pipeline runs
#   scheduler  ARQ cron    — per-source polling + daily briefing
#   postgres   PostgreSQL 16 + pgvector
#   redis      Redis 7 — cache, rate limits, task broker
# ============================================================================

name: danah

x-app-env: &app-env
  # Inside the compose network the services resolve by name, overriding the
  # localhost defaults that bare-metal dev uses.
  DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-danah}:${POSTGRES_PASSWORD:-danah}@postgres:5432/${POSTGRES_DB:-danah}
  REDIS_URL: redis://redis:6379/0
  STORAGE_LOCAL_PATH: /srv/danah/data/documents

x-app-base: &app-base
  build:
    context: .
    dockerfile: Dockerfile
  env_file:
    - .env
  environment:
    <<: *app-env
  volumes:
    - documents:/srv/danah/data/documents
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  restart: unless-stopped

services:
  # -------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-danah}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-danah}
      POSTGRES_DB: ${POSTGRES_DB:-danah}
      # Enables the test database used by pytest against the same instance.
      POSTGRES_INITDB_ARGS: "--data-checksums"
    ports:
      # Host port is configurable so DANAH can coexist with another Postgres already
      # bound to 5432 on the developer's machine. Container port is always 5432.
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/10-init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-danah} -d ${POSTGRES_DB:-danah}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # -------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # -------------------------------------------------------------------------
  api:
    <<: *app-base
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --proxy-headers"
    ports:
      - "${APP_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # -------------------------------------------------------------------------
  worker:
    <<: *app-base
    command: ["arq", "app.workers.worker.WorkerSettings"]
    # The image's HTTP healthcheck belongs to the API. A worker serves no port, so it is
    # replaced with a liveness probe that proves the process can still reach Redis.
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import redis,os;redis.Redis.from_url(os.environ['REDIS_URL']).ping()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy   # api owns migrations; worker waits for them

  # -------------------------------------------------------------------------
  scheduler:
    <<: *app-base
    command: ["arq", "app.workers.worker.SchedulerSettings"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import redis,os;redis.Redis.from_url(os.environ['REDIS_URL']).ping()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
  documents:
